name: Temporary Apply Issue 104 Quality Fixes

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.head_ref == 'fix/public-data-catalog-api-truth' }}
    name: Apply public data catalog quality fixes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Correct catalog script regression test
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/test_scripts.py")
          text = path.read_text(encoding="utf-8")
          old = "    assert len(payload) >= 10\n"
          new = (
              "    assert len(payload) >= 9\n"
              "    assert \"census_asm_annual\" not in {item[\"dataset_id\"] for item in payload}\n"
          )
          if old not in text:
              raise SystemExit("expected catalog-size assertion not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Apply Black formatting
        run: |
          black src/core/public_data.py src/interfaces/api/app.py src/interfaces/api/schemas.py tests/test_public_data.py tests/test_api.py tests/test_api_contract_compatibility.py tests/test_scripts.py
          ruff check src/core/public_data.py src/interfaces/api/app.py src/interfaces/api/schemas.py tests/test_public_data.py tests/test_api.py tests/test_api_contract_compatibility.py tests/test_scripts.py
          python -m mypy src/core/public_data.py src/interfaces/api/app.py src/interfaces/api/schemas.py
          pytest -q tests/test_public_data.py tests/test_api.py tests/test_api_contract_compatibility.py tests/test_scripts.py::test_public_data_readiness_catalog_outputs_json

      - name: Commit fixes and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/temp-public-data-catalog-diagnostics.yml
          git add src tests
          git commit -m "test: align public data catalog truth checks"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
