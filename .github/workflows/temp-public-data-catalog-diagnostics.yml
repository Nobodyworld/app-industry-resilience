name: Temporary Public Data Catalog Diagnostics

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  diagnostics:
    if: ${{ github.head_ref == 'fix/public-data-catalog-api-truth' }}
    name: Capture public data catalog coverage failures
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Capture runtime coverage
        continue-on-error: true
        run: |
          set -o pipefail
          make coverage-runtime 2>&1 | tee runtime-coverage.log

      - name: Capture full coverage
        continue-on-error: true
        run: |
          set -o pipefail
          make coverage-full 2>&1 | tee full-coverage.log

      - name: Upload coverage logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: public-data-catalog-coverage-logs
          path: |
            runtime-coverage.log
            full-coverage.log
