name: Temporary Evaluation Compatibility Export

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - architecture/evaluation-lineage

permissions:
  contents: read

jobs:
  export:
    name: Export API Compatibility Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: architecture/evaluation-lineage

      - name: Upload compatibility test
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: evaluation-compatibility-source
          path: tests/test_api_contract_compatibility.py
          if-no-files-found: error
          retention-days: 1
