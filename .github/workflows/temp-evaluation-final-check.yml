name: Temporary Final Evaluation Patch Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - architecture/evaluation-lineage

permissions:
  contents: read

jobs:
  check:
    name: Check Final Evaluation Patch
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: architecture/evaluation-lineage

      - name: Check embedded patch
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import re
          from pathlib import Path

          workflow = Path('.github/workflows/temp-evaluation-lineage-final.yml').read_text()
          match = re.search(r"echo '([^']+)' \| base64 --decode", workflow)
          if match is None:
              raise SystemExit('Embedded final patch was not found')
          Path('/tmp/evaluation-lineage-final.patch').write_bytes(base64.b64decode(match.group(1)))
          PY
          set +e
          git apply --check --verbose /tmp/evaluation-lineage-final.patch > patch-check.txt 2>&1
          echo $? > patch-check.exit
          git status --short --branch > branch-status.txt
          exit 0

      - name: Upload patch diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: evaluation-final-patch-check
          path: |
            patch-check.txt
            patch-check.exit
            branch-status.txt
          if-no-files-found: error
          retention-days: 1
