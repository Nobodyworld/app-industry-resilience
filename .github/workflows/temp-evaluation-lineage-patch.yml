name: Temporary Evaluation Lineage Patch

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - architecture/evaluation-lineage

permissions:
  contents: write

jobs:
  patch:
    name: Apply Evaluation Lineage Patch
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: architecture/evaluation-lineage

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Apply unified diff
        shell: bash
        run: |
          echo '' | base64 --decode > /tmp/evaluation-lineage.patch
          git apply --whitespace=nowarn /tmp/evaluation-lineage.patch

      - name: Format approved files
        run: >-
          python -m black
          src/application/idiot_index_service.py
          src/interfaces/api/schemas.py
          src/interfaces/api/app.py
          tests/test_evaluation_lineage.py

      - name: Validate approved files
        run: |
          python -m ruff check src/application/idiot_index_service.py src/interfaces/api/schemas.py src/interfaces/api/app.py tests/test_evaluation_lineage.py
          python -m mypy src
          python -m pytest -q tests/test_evaluation_lineage.py tests/test_lineage.py tests/test_api_contract_compatibility.py tests/test_api.py

      - name: Commit validated files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/application/idiot_index_service.py \
            src/interfaces/api/schemas.py \
            src/interfaces/api/app.py \
            tests/test_evaluation_lineage.py
          git diff --cached --check
          git commit -m "feat: propagate evaluation data lineage"
          git push origin HEAD:architecture/evaluation-lineage
