name: Temporary v0.2.0 RC Docs

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.head_ref == 'release/v0.2.0-rc1' }}
    name: Apply v0.2.0 release candidate docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout release candidate branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Apply exact release-candidate documentation edits
        run: |
          python - <<'PY'
          from pathlib import Path

          readme_path = Path("README.md")
          readme = readme_path.read_text(encoding="utf-8")
          old_status = "> **Status: PUBLIC BETA** — Functional and actively developed. The analytical metrics are experimental and should not be treated as financial, investment, credit, or policy advice."
          new_status = "> **Status: v0.2.0rc1 PUBLIC BETA RELEASE CANDIDATE** — Automated candidate validation is in progress. The analytical metrics remain experimental and should not be treated as financial, investment, credit, or policy advice."
          if old_status not in readme:
              raise SystemExit("README status line changed; refusing to edit")
          readme = readme.replace(old_status, new_status, 1)
          marker = "This repository demonstrates practical economic and financial analysis engineering"
          notice = (
              "Release-candidate evidence and manual Windows/Edge acceptance are tracked in "
              "[issue #107](https://github.com/Nobodyworld/app-industry-resilience/issues/107) and "
              "[`docs/execplans/v0.2.0-public-beta-release-candidate.md`](docs/execplans/v0.2.0-public-beta-release-candidate.md). "
              "The final `v0.2.0` tag and GitHub release must not be created before the recorded release-owner GO decision.\n\n"
          )
          if notice not in readme:
              position = readme.index(marker)
              readme = readme[:position] + notice + readme[position:]
          docs_line = "- [v0.2.0 release-candidate plan](docs/execplans/v0.2.0-public-beta-release-candidate.md)"
          docs_anchor = "## Documentation\n\n"
          if docs_line not in readme:
              readme = readme.replace(docs_anchor, docs_anchor + docs_line + "\n", 1)
          readme_path.write_text(readme, encoding="utf-8")

          changelog_path = Path("docs/CHANGELOG.md")
          changelog = changelog_path.read_text(encoding="utf-8")
          heading = "# Changelog\n\n"
          entry = (
              "# 2026-07-23 – v0.2.0 public-beta release candidate\n"
              "- Aligned the package, fallback, and Commitizen development versions at PEP 440 `0.2.0rc1`.\n"
              "- Added the issue #107 release gate and durable Windows/Edge acceptance record; final `0.2.0` publication remains blocked pending manual acceptance and fresh exact-head validation.\n"
              "- Preserved Public Beta classification and all experimental-methodology limitations; this candidate is not a `1.0.0` stability declaration.\n\n"
          )
          if not changelog.startswith(heading):
              raise SystemExit("CHANGELOG heading changed; refusing to edit")
          if entry not in changelog:
              changelog = changelog.replace(heading, heading + entry, 1)
          changelog_path.write_text(changelog, encoding="utf-8")
          PY

          git diff --check
          git diff -- README.md docs/CHANGELOG.md

      - name: Commit release-candidate docs and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/temp-v0.2.0-rc-docs.yml
          git add README.md docs/CHANGELOG.md
          git commit -m "docs: prepare v0.2.0 public-beta candidate"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
