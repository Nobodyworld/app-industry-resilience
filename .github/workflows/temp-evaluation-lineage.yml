name: Temporary Evaluation Lineage Generator

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - architecture/evaluation-lineage

permissions:
  contents: read

jobs:
  generate:
    name: Generate Evaluation Lineage
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Generate evaluation lineage implementation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          service_path = Path("src/application/idiot_index_service.py")
          service = service_path.read_text(encoding="utf-8")

          old_imports = '''    AppConfig,
              HealthSummary,
              MetricConfig,
              NormalizationOptions,
              SecurityUtils,
              apply_dtype_overrides,
              compute_health_scores,
              compute_metrics,
              format_for_display,
              load_config,
              normalize_columns,
              summarise_health,
          )'''.replace("          ", "")
          new_imports = '''    AppConfig,
              HealthSummary,
              LineageStep,
              MetricConfig,
              NormalizationOptions,
              SecurityUtils,
              append_lineage_step,
              apply_dtype_overrides,
              attach_lineage,
              build_lineage,
              compute_health_scores,
              compute_metrics,
              format_for_display,
              lineage_from_dataframe,
              load_config,
              normalize_columns,
              summarise_health,
          )'''.replace("          ", "")
          if old_imports not in service:
              raise SystemExit("Service core import block not found")
          service = service.replace(old_imports, new_imports, 1)

          old_pipeline = '''    normalized = normalize_columns(
              dataset,
              column_aliases=(normalization_options.column_aliases if normalization_options else None),
              dtype_overrides=(normalization_options.dtype_overrides if normalization_options else None),
          )
              metrics = compute_metrics(normalized, config=metric_config)
              display = format_for_display(
              metrics,
              dtype_overrides=(normalization_options.dtype_overrides if normalization_options else None),
          )
              if normalization_options and normalization_options.dtype_overrides:
              apply_dtype_overrides(display, normalization_options.dtype_overrides)
              display = compute_health_scores(display)
          
              filtered = _filter_dataframe(display, sanitized_search)
          '''.replace("          ", "")
          new_pipeline = '''    dataset = _ensure_source_lineage(dataset, source=source, year=year)
          
              normalized = normalize_columns(
              dataset,
              column_aliases=(normalization_options.column_aliases if normalization_options else None),
              dtype_overrides=(normalization_options.dtype_overrides if normalization_options else None),
          )
              normalized = _append_frame_lineage_step(
              normalized,
              dataset,
              "normalize_columns",
              details={"column_count": len(normalized.columns)},
          )
              metrics = compute_metrics(normalized, config=metric_config)
              metric_count = len(set(metrics.columns).difference(normalized.columns))
              metrics = _append_frame_lineage_step(
              metrics,
              normalized,
              "compute_metrics",
              details={"metric_count": metric_count},
          )
              display = format_for_display(
              metrics,
              dtype_overrides=(normalization_options.dtype_overrides if normalization_options else None),
          )
              if normalization_options and normalization_options.dtype_overrides:
              apply_dtype_overrides(display, normalization_options.dtype_overrides)
              display = compute_health_scores(display)
              display = _append_frame_lineage_step(display, metrics, "compute_health_scores")
          
              filtered = _filter_dataframe(display, sanitized_search)
              filtered = _append_frame_lineage_step(
              filtered,
              display,
              "filter_records",
              details={
                  "filter_applied": sanitized_search is not None,
                  "result_count": len(filtered),
              },
          )
          '''.replace("          ", "")
          if old_pipeline not in service:
              raise SystemExit("Service evaluation pipeline block not found")
          service = service.replace(old_pipeline, new_pipeline, 1)

          helper_marker = '''def _resolve_dataset(
          '''.replace("          ", "")
          helper_block = '''def _ensure_source_lineage(
              frame: pd.DataFrame,
              *,
              source: DataSource,
              year: int,
          ) -> pd.DataFrame:
              """Attach source lineage when the source boundary has not already done so."""
          
              if lineage_from_dataframe(frame) is not None:
                  return frame
              if source is not DataSource.SAMPLE:
                  return frame
          
              lineage = build_lineage(
                  source="sample",
                  source_kind="bundled_sample",
                  dataset_id="sample_industries",
                  observation_period=year,
                  retrieval_mode="bundled",
                  is_sample=True,
                  is_official=False,
                  transformations=(
                      LineageStep(
                          name="source_load",
                          details={"record_count": len(frame)},
                      ),
                  ),
              )
              return attach_lineage(frame, lineage)
          
          
          def _append_frame_lineage_step(
              target: pd.DataFrame,
              source: pd.DataFrame,
              step_name: str,
              *,
              details: dict[str, str | int | float | bool | None] | None = None,
          ) -> pd.DataFrame:
              """Copy typed lineage from ``source`` and append one bounded step."""
          
              lineage = lineage_from_dataframe(source)
              if lineage is None:
                  return target
              updated = append_lineage_step(lineage, step_name, details=details or {})
              return attach_lineage(target, updated)
          
          
          def _resolve_dataset(
          '''.replace("          ", "")
          if helper_marker not in service:
              raise SystemExit("Service helper insertion marker not found")
          service = service.replace(helper_marker, helper_block, 1)
          service_path.write_text(service, encoding="utf-8")

          schemas_path = Path("src/interfaces/api/schemas.py")
          schemas = schemas_path.read_text(encoding="utf-8")
          old_core_import = "from src.core import HealthSummary"
          new_core_import = '''from src.core import (
              HealthSummary,
              lineage_from_dataframe,
              lineage_to_dict,
          )'''.replace("          ", "")
          if old_core_import not in schemas:
              raise SystemExit("Schemas core import not found")
          schemas = schemas.replace(old_core_import, new_core_import, 1)

          models_marker = "class EvaluateResponse(BaseModel):"
          models_block = '''class LineageStepModel(BaseModel):
              """Public API representation of one bounded lineage transformation."""
          
              name: str
              version: str
              details: dict[str, Any] = Field(default_factory=dict)
          
          
          class LineageEnvelopeModel(BaseModel):
              """Typed, redacted lineage returned with analytical responses."""
          
              schema_version: str
              source: str
              source_kind: str
              dataset_id: str
              provider: str | None = None
              observation_period: str
              acquired_at: str | None = None
              snapshot_at: str | None = None
              retrieval_mode: str
              is_sample: bool
              is_official: bool
              calculation_version: str
              transformations: list[LineageStepModel] = Field(default_factory=list)
              cache_status: str
          
          
          def lineage_model_from_dataframe(frame: pd.DataFrame) -> LineageEnvelopeModel | None:
              """Return the allowlisted typed lineage model for ``frame`` when present."""
          
              lineage = lineage_from_dataframe(frame)
              if lineage is None:
                  return None
              return LineageEnvelopeModel(**lineage_to_dict(lineage))
          
          
          class EvaluateResponse(BaseModel):
          '''.replace("          ", "")
          if models_marker not in schemas:
              raise SystemExit("EvaluateResponse marker not found")
          schemas = schemas.replace(models_marker, models_block, 1)

          old_eval_fields = '''    metadata: dict[str, Any] = Field(default_factory=dict)
              health: HealthAnalyticsEnvelope | None = None
          '''.replace("          ", "")
          new_eval_fields = '''    metadata: dict[str, Any] = Field(default_factory=dict)
              lineage: LineageEnvelopeModel | None = None
              health: HealthAnalyticsEnvelope | None = None
          '''.replace("          ", "")
          if old_eval_fields not in schemas:
              raise SystemExit("EvaluateResponse fields not found")
          schemas = schemas.replace(old_eval_fields, new_eval_fields, 1)

          old_health_fields = '''    health: HealthAnalyticsEnvelope
              metadata: dict[str, Any] = Field(default_factory=dict)
          '''.replace("          ", "")
          new_health_fields = '''    health: HealthAnalyticsEnvelope
              metadata: dict[str, Any] = Field(default_factory=dict)
              lineage: LineageEnvelopeModel | None = None
          '''.replace("          ", "")
          if old_health_fields not in schemas:
              raise SystemExit("HealthAnalyticsResponse fields not found")
          schemas = schemas.replace(old_health_fields, new_health_fields, 1)

          old_summary_fields = '''        metadata=metadata,
                  health=health_envelope,
          '''.replace("          ", "")
          new_summary_fields = '''        metadata=metadata,
                  lineage=lineage_model_from_dataframe(summary.dataframe_full),
                  health=health_envelope,
          '''.replace("          ", "")
          if old_summary_fields not in schemas:
              raise SystemExit("summary_to_response fields not found")
          schemas = schemas.replace(old_summary_fields, new_summary_fields, 1)
          schemas_path.write_text(schemas, encoding="utf-8")

          app_path = Path("src/interfaces/api/app.py")
          app = app_path.read_text(encoding="utf-8")
          if "from datetime import UTC, datetime\n" not in app:
              app = app.replace("import os\n", "import os\nfrom datetime import UTC, datetime\n", 1)

          old_app_core = "from src.core import summarise_health"
          new_app_core = '''from src.core import LineageStep, attach_lineage, build_lineage, summarise_health'''
          if old_app_core not in app:
              raise SystemExit("API core import not found")
          app = app.replace(old_app_core, new_app_core, 1)

          old_schema_import = '''    metadata_from_summary,
              records_to_dataframe,
          '''.replace("          ", "")
          new_schema_import = '''    lineage_model_from_dataframe,
              metadata_from_summary,
              records_to_dataframe,
          '''.replace("          ", "")
          if old_schema_import not in app:
              raise SystemExit("API schema helper import marker not found")
          app = app.replace(old_schema_import, new_schema_import, 1)

          inline_helper_marker = '''def _evaluate_response(
          '''.replace("          ", "")
          inline_helper = '''def _attach_api_inline_lineage(frame, *, year: int) -> None:
              """Attach redacted source lineage for API-supplied inline records."""
          
              lineage = build_lineage(
                  source="api-inline",
                  source_kind="inline_records",
                  dataset_id="api-inline",
                  observation_period=year,
                  acquired_at=datetime.now(UTC),
                  retrieval_mode="inline",
                  is_sample=False,
                  is_official=False,
                  transformations=(
                      LineageStep(
                          name="source_load",
                          details={"record_count": len(frame)},
                      ),
                  ),
              )
              attach_lineage(frame, lineage)
          
          
          def _evaluate_response(
          '''.replace("          ", "")
          if inline_helper_marker not in app:
              raise SystemExit("API inline helper marker not found")
          app = app.replace(inline_helper_marker, inline_helper, 1)

          old_eval_attrs = '''            dataframe.attrs.setdefault("source", "api-inline")
                  dataframe.attrs.setdefault("source_origin", "api")
          '''.replace("          ", "")
          new_eval_attrs = '''            dataframe.attrs.setdefault("source", "api-inline")
                  dataframe.attrs.setdefault("source_origin", "api")
                  _attach_api_inline_lineage(dataframe, year=request.year)
          '''.replace("          ", "")
          if old_eval_attrs not in app:
              raise SystemExit("API evaluate inline attrs not found")
          app = app.replace(old_eval_attrs, new_eval_attrs, 1)

          old_health_attrs = '''        dataframe.attrs.setdefault("source", "api-inline")
              dataframe.attrs.setdefault("source_origin", "api-health")
          '''.replace("          ", "")
          new_health_attrs = '''        dataframe.attrs.setdefault("source", "api-inline")
              dataframe.attrs.setdefault("source_origin", "api-health")
              _attach_api_inline_lineage(dataframe, year=request.year)
          '''.replace("          ", "")
          if old_health_attrs not in app:
              raise SystemExit("API health inline attrs not found")
          app = app.replace(old_health_attrs, new_health_attrs, 1)

          old_health_response = '''        health=envelope,
                  metadata=metadata_from_summary(summary),
          '''.replace("          ", "")
          new_health_response = '''        health=envelope,
                  metadata=metadata_from_summary(summary),
                  lineage=lineage_model_from_dataframe(summary.dataframe_full),
          '''.replace("          ", "")
          if old_health_response not in app:
              raise SystemExit("API health response fields not found")
          app = app.replace(old_health_response, new_health_response, 1)
          app_path.write_text(app, encoding="utf-8")
          PY

      - name: Format generated files
        run: >-
          python -m black
          src/application/idiot_index_service.py
          src/interfaces/api/schemas.py
          src/interfaces/api/app.py
          tests/test_evaluation_lineage.py

      - name: Validate generated lineage
        run: |
          python -m ruff check src/application/idiot_index_service.py src/interfaces/api/schemas.py src/interfaces/api/app.py tests/test_evaluation_lineage.py
          python -m mypy src
          python -m pytest -q tests/test_evaluation_lineage.py tests/test_lineage.py tests/test_api_contract_compatibility.py tests/test_api.py

      - name: Upload generated files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: validated-evaluation-lineage-files
          path: |
            src/application/idiot_index_service.py
            src/interfaces/api/schemas.py
            src/interfaces/api/app.py
            tests/test_evaluation_lineage.py
          if-no-files-found: error
          retention-days: 1
