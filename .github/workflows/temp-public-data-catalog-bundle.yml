name: Temporary Verify Issue 104

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  verify:
    if: ${{ github.head_ref == 'fix/public-data-catalog-api-truth' }}
    name: Verify public data catalog patches
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Decode and capture verification
        run: |
          tr -d '[:space:]' < .github/issue-104-code.patch.b64 | base64 --decode > /tmp/issue-104-code.patch || true
          tr -d '[:space:]' < .github/issue-104-docs.patch.b64 | base64 --decode > /tmp/issue-104-docs.patch || true
          {
            echo '== sizes =='
            wc -c .github/issue-104-code.patch.b64 .github/issue-104-docs.patch.b64 /tmp/issue-104-code.patch /tmp/issue-104-docs.patch
            echo '== hashes =='
            sha256sum /tmp/issue-104-code.patch /tmp/issue-104-docs.patch
            echo '== code verification =='
            git apply --check --verbose /tmp/issue-104-code.patch
            echo '== docs verification =='
            git apply --check --verbose /tmp/issue-104-docs.patch
          } > /tmp/verification.log 2>&1 || true

      - name: Upload verification log
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: issue-104-patch-verification
          path: /tmp/verification.log
