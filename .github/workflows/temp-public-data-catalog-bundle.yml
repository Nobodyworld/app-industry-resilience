name: Temporary Inspect Issue 104

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  inspect:
    if: ${{ github.head_ref == 'fix/public-data-catalog-api-truth' }}
    name: Inspect public data catalog patch bytes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Decode staged patches
        run: |
          tr -d '[:space:]' < .github/issue-104-code.patch.b64 | base64 --decode > /tmp/issue-104-code.patch || true
          tr -d '[:space:]' < .github/issue-104-docs.patch.b64 | base64 --decode > /tmp/issue-104-docs.patch || true
          cp .github/issue-104-code.patch.b64 /tmp/issue-104-code.patch.b64
          cp .github/issue-104-docs.patch.b64 /tmp/issue-104-docs.patch.b64

      - name: Upload staged patch bytes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: issue-104-staged-patches
          path: |
            /tmp/issue-104-code.patch
            /tmp/issue-104-docs.patch
            /tmp/issue-104-code.patch.b64
            /tmp/issue-104-docs.patch.b64
