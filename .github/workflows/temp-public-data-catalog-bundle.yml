name: Temporary Apply Issue 104

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.head_ref == 'fix/public-data-catalog-api-truth' }}
    name: Apply truthful public data catalog patch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Decode and verify reviewed patches
        run: |
          base64 --decode .github/issue-104-code.patch.b64 > /tmp/issue-104-code.patch
          base64 --decode .github/issue-104-docs.patch.b64 > /tmp/issue-104-docs.patch
          git apply --check /tmp/issue-104-code.patch
          git apply --check /tmp/issue-104-docs.patch

      - name: Apply and syntax-check implementation
        run: |
          git apply --whitespace=error /tmp/issue-104-code.patch
          git apply --whitespace=error /tmp/issue-104-docs.patch
          python -m py_compile \
            src/core/public_data.py \
            src/interfaces/api/app.py \
            src/interfaces/api/schemas.py \
            tests/test_public_data.py \
            tests/test_api.py \
            tests/test_api_contract_compatibility.py

      - name: Commit feature changes and remove temporary machinery
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/issue-104-code.patch.b64 \
            .github/issue-104-docs.patch.b64 \
            .github/workflows/temp-public-data-catalog-bundle.yml
          git add README.md TASKLIST.md docs src tests
          git commit -m "fix: publish truthful public data catalog"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
