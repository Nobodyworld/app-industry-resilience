name: Temporary Public Data Catalog Bundle

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  bundle:
    if: ${{ github.head_ref == 'fix/public-data-catalog-api-truth' }}
    name: Package public data catalog source files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Package source files
        run: |
          tar -czf public-data-catalog-source.tar.gz \
            README.md \
            TASKLIST.md \
            docs/API_VERSIONING_AND_LINEAGE.md \
            docs/API_REFERENCE.md \
            docs/API_HEADLESS.md \
            docs/CHANGELOG.md \
            src/core/public_data.py \
            src/interfaces/api/app.py \
            src/interfaces/api/schemas.py \
            tests/test_public_data.py \
            tests/test_api.py \
            tests/test_api_contract_compatibility.py

      - name: Upload source bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: public-data-catalog-source
          path: public-data-catalog-source.tar.gz
