name: Temporary Lineage Diagnostics

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - architecture/v1-lineage-contract

permissions:
  contents: read

jobs:
  diagnose:
    name: Diagnose Lineage Quality
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Black check
        run: python -m black --check src/core/__init__.py src/core/lineage.py tests/test_lineage.py

      - name: Ruff check
        run: python -m ruff check src/core/__init__.py src/core/lineage.py tests/test_lineage.py

      - name: Mypy check
        run: python -m mypy src

      - name: Focused lineage tests
        run: python -m pytest -q tests/test_lineage.py

      - name: Runtime coverage gate
        run: >-
          python -m pytest -q
          --cov=src/adapters
          --cov=src/agents
          --cov=src/application
          --cov=src/core
          --cov=src/extensions
          --cov=src/infrastructure
          --cov=src/interfaces/api
          --cov=src/interfaces/streamlit
          --cov-report=term-missing
          --cov-fail-under=85
