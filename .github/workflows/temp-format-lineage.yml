name: Temporary Lineage Formatter

on:
  push:
    branches:
      - architecture/v1-lineage-contract

permissions:
  contents: read

jobs:
  format:
    name: Format Lineage Files
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Black
        run: python -m pip install "black>=26.5.1,<27"

      - name: Format lineage files
        run: python -m black src/core/__init__.py src/core/lineage.py tests/test_lineage.py

      - name: Upload formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: formatted-lineage-files
          path: |
            src/core/__init__.py
            src/core/lineage.py
            tests/test_lineage.py
          if-no-files-found: error
          retention-days: 1
