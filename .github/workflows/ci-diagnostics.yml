name: CI Diagnostics

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  diagnose:
    name: Capture Formatted Files
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Generate exact formatted files
        shell: bash
        run: |
          mkdir -p build/black-formatted/src/adapters build/black-formatted/tests
          cp src/adapters/_contracts.py build/black-formatted/src/adapters/_contracts.py
          cp src/adapters/bea.py build/black-formatted/src/adapters/bea.py
          cp src/adapters/census_asm.py build/black-formatted/src/adapters/census_asm.py
          cp tests/test_adapter_contract_validation.py build/black-formatted/tests/test_adapter_contract_validation.py
          python - <<'PY'
          from pathlib import Path

          path = Path("build/black-formatted/src/adapters/bea.py")
          content = path.read_text(encoding="utf-8")
          old = "    if isinstance(year, int):\n        years = (year,)\n"
          new = "    years: tuple[int, ...]\n    if isinstance(year, int):\n        years = (year,)\n"
          if old not in content:
              raise SystemExit("Unable to locate _ensure_years assignment")
          path.write_text(content.replace(old, new, 1), encoding="utf-8")
          PY
          python -m black build/black-formatted/src/adapters/_contracts.py \
            build/black-formatted/src/adapters/bea.py \
            build/black-formatted/src/adapters/census_asm.py \
            build/black-formatted/tests/test_adapter_contract_validation.py
          python -m black --check build/black-formatted

      - name: Upload formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: black-formatted
          path: build/black-formatted
