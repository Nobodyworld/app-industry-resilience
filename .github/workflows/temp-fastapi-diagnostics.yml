name: Temporary FastAPI Compatibility Diagnostics

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - architecture/fastapi-contract-metadata

permissions:
  contents: read

jobs:
  diagnose:
    name: Diagnose FastAPI Compatibility
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Capture checks
        shell: bash
        run: |
          set +e
          python -m black --check fastapi_compat tests/test_fastapi_compat_contracts.py > black.txt 2>&1
          echo $? > black.exit
          python -m ruff check fastapi_compat tests/test_fastapi_compat_contracts.py > ruff.txt 2>&1
          echo $? > ruff.exit
          python -m mypy src > mypy.txt 2>&1
          echo $? > mypy.exit
          python -m pytest -q tests/test_fastapi_compat_contracts.py tests/test_fastapi_compat_wsgi.py tests/test_api.py > tests.txt 2>&1
          echo $? > tests.exit
          exit 0

      - name: Upload diagnostic outputs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: fastapi-compatibility-diagnostics
          path: |
            *.txt
            *.exit
          if-no-files-found: error
          retention-days: 1
