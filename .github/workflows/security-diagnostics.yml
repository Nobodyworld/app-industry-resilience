name: Security Diagnostics

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  diagnose:
    name: Capture Security Diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Capture security outputs
        shell: bash
        run: |
          mkdir -p build/security-diagnostics
          set +e
          python -m pip_audit -r requirements.txt -r requirements-dev.txt \
            > build/security-diagnostics/pip-audit.log 2>&1
          echo $? > build/security-diagnostics/pip-audit.exit
          detect-secrets-hook --baseline config/.secrets.baseline \
            > build/security-diagnostics/detect-secrets.log 2>&1
          echo $? > build/security-diagnostics/detect-secrets.exit
          set -e

      - name: Upload security outputs
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-diagnostics
          path: build/security-diagnostics
