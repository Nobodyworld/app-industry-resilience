name: Regression Diagnostics

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  diagnose:
    name: Capture Regression Diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Capture regression output
        shell: bash
        run: |
          mkdir -p build/regression-diagnostics
          set +e
          python -m pytest -q > build/regression-diagnostics/pytest.log 2>&1
          echo $? > build/regression-diagnostics/pytest.exit
          set -e

      - name: Upload regression output
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: regression-diagnostics
          path: build/regression-diagnostics
