name: Temporary Provenance Source Bundle

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  bundle:
    name: Package provenance source files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Package source files
        run: |
          tar -czf provenance-source-bundle.tar.gz \
            app.py \
            README.md \
            SPEC.md \
            TASKLIST.md \
            docs/SPEC.md \
            docs/CHANGELOG.md \
            src/interfaces/streamlit/components.py \
            tests/test_application.py \
            tests/test_streamlit_components.py

      - name: Upload source bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: provenance-source-bundle
          path: provenance-source-bundle.tar.gz
