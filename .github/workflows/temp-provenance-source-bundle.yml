name: Temporary Apply Issue 101

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.head_ref == 'fix/upload-lineage-dashboard-provenance' }}
    name: Apply uploaded-lineage provenance patch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Apply reviewed patches
        run: |
          git apply --check .github/issue-101-code.patch
          git apply --check .github/issue-101-docs.patch
          git apply .github/issue-101-code.patch
          git apply .github/issue-101-docs.patch
          python -m py_compile \
            app.py \
            src/interfaces/streamlit/components.py \
            src/interfaces/streamlit/provenance.py \
            tests/test_application.py \
            tests/test_streamlit_components.py \
            tests/test_streamlit_provenance.py

      - name: Commit feature changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.py README.md SPEC.md TASKLIST.md docs/CHANGELOG.md docs/SPEC.md \
            src/interfaces/streamlit/components.py \
            tests/test_application.py \
            tests/test_streamlit_components.py
          git commit -m "fix: classify uploaded lineage and show provenance"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
